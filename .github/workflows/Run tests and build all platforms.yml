name: Test and Build

on: push

jobs:
  runTests:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editmode
          - playmode
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-tests-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-tests-
            
      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        id: testRunner
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: ${{ matrix.testMode }}
          artifactsPath: ${{ matrix.testMode }}-artifacts
          customParameters: -enableCodeCoverage
          
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.testMode }}-test-results
          path: ${{ steps.testRunner.outputs.artifactsPath }}
          
      - name: Parse test results
        if: always()
        run: |
          echo "📊 Test Results for ${{ matrix.testMode }}:"
          if [ -f "${{ steps.testRunner.outputs.artifactsPath }}/${{ matrix.testMode }}-results.xml" ]; then
            echo "✅ Test results file found"
            # Простой парсинг результатов
            passed=$(grep -o 'passed="[0-9]*"' "${{ steps.testRunner.outputs.artifactsPath }}/${{ matrix.testMode }}-results.xml" | grep -o '[0-9]*')
            failed=$(grep -o 'failed="[0-9]*"' "${{ steps.testRunner.outputs.artifactsPath }}/${{ matrix.testMode }}-results.xml" | grep -o '[0-9]*')
            echo "✅ Passed tests: $passed"
            echo "❌ Failed tests: $failed"
          else
            echo "⚠️ Test results file not found"
          fi

  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    needs: runTests
    if: success()
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows
          - Android
          - WebGL
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-build-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-build-
            
      - name: Free disk space (for Android)
        if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1
        
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: GameCore
          buildPath: build/${{ matrix.targetPlatform }}
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
